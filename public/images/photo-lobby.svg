<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="photoBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a0f2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#photoBg1)"/>
  <!-- 大厅柱子 -->
  <rect x="50" y="200" width="60" height="500" fill="#d4af37" opacity="0.4"/>
  <rect x="490" y="200" width="60" height="500" fill="#d4af37" opacity="0.4"/>
  <!-- 顶部装饰 -->
  <rect x="40" y="180" width="80" height="20" fill="#d4af37" opacity="0.5"/>
  <rect x="480" y="180" width="80" height="20" fill="#d4af37" opacity="0.5"/>
  <!-- 地板 -->
  <rect x="0" y="650" width="600" height="150" fill="#2d1b4e"/>
  <!-- 星星/装饰灯 -->
  <circle cx="150" cy="100" r="2" fill="#ffd700" opacity="0.8"/>
  <circle cx="300" cy="80" r="2.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="450" cy="110" r="2" fill="#ffd700" opacity="0.7"/>
  <circle cx="200" cy="150" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="400" cy="130" r="1.5" fill="#ffd700" opacity="0.6"/>
  <!-- 中央吊灯 -->
  <circle cx="300" cy="150" r="40" fill="#d4af37" opacity="0.3"/>
  <circle cx="300" cy="150" r="25" fill="#ffd700" opacity="0.5"/>
  <circle cx="300" cy="150" r="15" fill="#ffffff" opacity="0.6"/>
  <!-- 参观者剪影 -->
  <ellipse cx="250" cy="550" rx="20" ry="35" fill="#1a0f2e" opacity="0.6"/>
  <circle cx="250" cy="500" r="15" fill="#1a0f2e" opacity="0.6"/>
  <ellipse cx="350" cy="560" rx="18" ry="30" fill="#1a0f2e" opacity="0.5"/>
  <circle cx="350" cy="515" r="13" fill="#1a0f2e" opacity="0.5"/>
  <!-- 文字 -->
  <text x="300" y="720" text-anchor="middle" fill="#d4af37" font-size="24" font-family="serif">
    元宇宙博物馆
  </text>
  <text x="300" y="750" text-anchor="middle" fill="#8877aa" font-size="14" font-family="sans-serif">
    Metaverse Museum
  </text>
</svg>
