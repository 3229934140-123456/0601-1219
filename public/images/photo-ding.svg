<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="photoBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2a2a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d3d3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1a1a;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#photoBg2)"/>
  <!-- 展台 -->
  <rect x="200" y="500" width="200" height="30" fill="#00d4aa" opacity="0.4"/>
  <rect x="220" y="470" width="160" height="35" fill="#00d4aa" opacity="0.3"/>
  <!-- 青铜鼎 -->
  <rect x="240" y="380" width="120" height="100" fill="#8b4513" opacity="0.8"/>
  <rect x="230" y="360" width="140" height="30" rx="5" fill="#a0522d" opacity="0.8"/>
  <!-- 鼎腿 -->
  <rect x="250" y="470" width="15" height="40" fill="#654321"/>
  <rect x="335" y="470" width="15" height="40" fill="#654321"/>
  <!-- 鼎耳 -->
  <rect x="245" y="340" width="10" height="25" rx="3" fill="#8b4513"/>
  <rect x="345" y="340" width="10" height="25" rx="3" fill="#8b4513"/>
  <!-- 发光效果 -->
  <ellipse cx="300" cy="420" rx="150" ry="200" fill="#ffd700" opacity="0.1"/>
  <!-- 文物标签 -->
  <rect x="400" y="450" width="120" height="60" rx="5" fill="#1a1a2e" opacity="0.8" stroke="#00d4aa" stroke-width="1"/>
  <text x="460" y="475" text-anchor="middle" fill="#00d4aa" font-size="14">青铜方鼎</text>
  <text x="460" y="495" text-anchor="middle" fill="#8892a6" font-size="10">商代晚期</text>
  <!-- 地面 -->
  <rect x="0" y="600" width="600" height="200" fill="#0a1a1a"/>
  <!-- 参观标识 -->
  <text x="300" y="700" text-anchor="middle" fill="#00d4aa" font-size="20" font-family="serif">
    青铜方鼎前留影
  </text>
</svg>
