<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="photoBg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a2a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d2840;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#photoBg5)"/>
  <!-- 艺术长廊画作 -->
  <rect x="60" y="180" width="140" height="200" fill="#1a1a2e" stroke="#d4af37" stroke-width="4" opacity="0.8"/>
  <rect x="75" y="195" width="110" height="170" fill="#2d2d4a" opacity="0.6"/>
  <!-- 画中风景 -->
  <path d="M80 320 Q120 280 160 320 Q180 300 180 340 L80 340 Z" fill="#2e8b57" opacity="0.4"/>
  <circle cx="150" cy="220" r="20" fill="#ffd700" opacity="0.3"/>
  <path d="M80 340 L100 280 L130 340 Z" fill="#228b22" opacity="0.5"/>
  
  <rect x="230" y="150" width="160" height="240" fill="#1a1a2e" stroke="#d4af37" stroke-width="5" opacity="0.8"/>
  <rect x="245" y="165" width="130" height="210" fill="#2d2d4a" opacity="0.6"/>
  <!-- 画中抽象 -->
  <circle cx="280" cy="240" r="30" fill="#ff6b9d" opacity="0.5"/>
  <rect x="320" y="200" width="40" height="80" fill="#4169e1" opacity="0.4"/>
  <path d="M250 320 L310 280 L370 340 L310 350 Z" fill="#00d4aa" opacity="0.3"/>
  
  <rect x="420" y="180" width="140" height="200" fill="#1a1a2e" stroke="#d4af37" stroke-width="4" opacity="0.8"/>
  <rect x="435" y="195" width="110" height="170" fill="#2d2d4a" opacity="0.6"/>
  <!-- 画中人物 -->
  <ellipse cx="490" cy="260" rx="25" ry="35" fill="#8b4513" opacity="0.4"/>
  <circle cx="490" cy="220" r="15" fill="#d2b48c" opacity="0.5"/>
  
  <!-- 地板 -->
  <rect x="0" y="500" width="600" height="300" fill="#0d1a28"/>
  <!-- 反光 -->
  <rect x="60" y="520" width="140" height="80" fill="#d4af37" opacity="0.05"/>
  <rect x="230" y="520" width="160" height="100" fill="#d4af37" opacity="0.05"/>
  <rect x="420" y="520" width="140" height="80" fill="#d4af37" opacity="0.05"/>
