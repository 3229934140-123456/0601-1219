<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2d4a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#112240;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow1" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg1)"/>
  <circle cx="200" cy="100" r="60" fill="url(#glow1)"/>
  <!-- 古代鼎轮廓 -->
  <path d="M140 180 L140 220 Q140 240 160 240 L240 240 Q260 240 260 220 L260 180 L240 180 L240 160 L160 160 L160 180 Z" 
        fill="none" stroke="#d4af37" stroke-width="3" opacity="0.8"/>
  <path d="M170 160 L170 140 Q170 130 200 130 Q230 130 230 140 L230 160" 
        fill="none" stroke="#d4af37" stroke-width="3" opacity="0.8"/>
  <rect x="150" y="240" width="20" height="20" fill="#d4af37" opacity="0.6"/>
  <rect x="230" y="240" width="20" height="20" fill="#d4af37" opacity="0.6"/>
  <!-- 装饰纹样 -->
  <circle cx="200" cy="200" r="15" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.5"/>
  <text x="200" y="285" text-anchor="middle" fill="#8892a6" font-size="12" font-family="serif">
    青铜文明
  </text>
  <!-- 粒子效果 -->
  <circle cx="80" cy="60" r="2" fill="#ffffff" opacity="0.6"/>
  <circle cx="320" cy="80" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="350" cy="150" r="2" fill="#d4af37" opacity="0.4"/>
  <circle cx="50" cy="200" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="300" cy="250" r="1" fill="#d4af37" opacity="0.5"/>
</svg>
