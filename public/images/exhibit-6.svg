<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="exbg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2847;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#061224;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="meteorite" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#8b7355;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6b5344;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a3728;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="glow6" cx="50%" cy="50%" r="60%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="300" height="300" fill="url(#exbg6)"/>
  <!-- 星空背景 -->
  <circle cx="30" cy="30" r="1" fill="#ffffff" opacity="0.8"/>
  <circle cx="80" cy="60" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="200" cy="40" r="1" fill="#ffffff" opacity="0.9"/>
  <circle cx="260" cy="70" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="50" cy="120" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="280" cy="150" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="30" cy="200" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="250" cy="230" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="80" cy="270" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="220" cy="270" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="150" cy="30" r="0.5" fill="#d4af37" opacity="0.8"/>
  <circle cx="180" cy="200" r="0.5" fill="#d4af37" opacity="0.7"/>
  
  <circle cx="150" cy="150" r="80" fill="url(#glow6)"/>
  <!-- 陨石主体 -->
  <ellipse cx="150" cy="150" rx="70" ry="60" fill="url(#meteorite)"/>
  <!-- 陨石表面纹理 -->
  <ellipse cx="130" cy="130" rx="15" ry="10" fill="#8b7355" opacity="0.6"/>
  <ellipse cx="170" cy="140" rx="12" ry="8" fill="#6b5344" opacity="0.7"/>
  <ellipse cx="145" cy="170" rx="20" ry="12" fill="#5a4535" opacity="0.6"/>
  <ellipse cx="180" cy="170" rx="10" ry="7" fill="#8b7355" opacity="0.5"/>
  <ellipse cx="120" cy="160" rx="8" ry="6" fill="#5a4535" opacity="0.7"/>
  <!-- 金属闪光点 -->
  <circle cx="135" cy="125" r="3" fill="#d4af37" opacity="0.8"/>
  <circle cx="165" cy="155" r="2" fill="#d4af37" opacity="0.6"/>
  <circle cx="145" cy="165" r="2.5" fill="#c0c0c0" opacity="0.5"/>
  <circle cx="180" cy="145" r="2" fill="#d4af37" opacity="0.7"/>
  <circle cx="125" cy="150" r="1.5" fill="#c0c0c0" opacity="0.6"/>
  <!-- 熔蚀痕迹 -->
  <path d="M100 150 Q120 130 140 150" fill="none" stroke="#4a3728" stroke-width="2" opacity="0.5"/>
  <path d="M160 170 Q180 160 200 175" fill="none" stroke="#4a3728" stroke-width="2" opacity="0.5"/>
  <!-- 光晕 -->
  <ellipse cx="150" cy="150" rx="90" ry="80" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.3"/>
  <!-- 底部岩石/基座 -->
  <ellipse cx="150" cy="240" rx="60" ry="15" fill="#2d1f14" opacity="0.6"/>
</svg>
