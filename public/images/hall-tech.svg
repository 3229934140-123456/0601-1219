<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a2a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d2840;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow4" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg4)"/>
  <!-- 数字网格 -->
  <line x1="0" y1="200" x2="400" y2="200" stroke="#00d4aa" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="230" x2="400" y2="230" stroke="#00d4aa" stroke-width="0.5" opacity="0.2"/>
  <line x1="0" y1="260" x2="400" y2="260" stroke="#00d4aa" stroke-width="0.5" opacity="0.2"/>
  <line x1="50" y1="0" x2="50" y2="300" stroke="#00d4aa" stroke-width="0.5" opacity="0.2"/>
  <line x1="150" y1="0" x2="150" y2="300" stroke="#00d4aa" stroke-width="0.5" opacity="0.2"/>
  <line x1="250" y1="0" x2="250" y2="300" stroke="#00d4aa" stroke-width="0.5" opacity="0.2"/>
  <line x1="350" y1="0" x2="350" y2="300" stroke="#00d4aa" stroke-width="0.5" opacity="0.2"/>
  <!-- 全息投影人像 -->
  <rect x="150" y="60" width="100" height="160" fill="url(#glow4)"/>
  <ellipse cx="200" cy="90" rx="25" ry="30" fill="#00d4aa" opacity="0.3"/>
  <path d="M170 120 L170 200 Q180 210 200 210 Q220 210 230 200 L230 120" 
        fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.5"/>
  <!-- 扫描线 -->
  <rect x="150" y="100" width="100" height="2" fill="#00d4aa" opacity="0.8">
    <animate attributeName="y" values="60;220;60" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- 数据点 -->
  <circle cx="80" cy="100" r="3" fill="#00d4aa" opacity="0.8"/>
  <circle cx="320" cy="120" r="2" fill="#d4af37" opacity="0.8"/>
  <circle cx="300" cy="240" r="3" fill="#00d4aa" opacity="0.6"/>
  <circle cx="100" cy="250" r="2" fill="#d4af37" opacity="0.7"/>
  <!-- VR 眼镜轮廓 -->
  <rect x="280" y="180" width="60" height="30" rx="5" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.6"/>
  <line x1="310" y1="180" x2="310" y2="210" stroke="#d4af37" stroke-width="1" opacity="0.6"/>
  <text x="200" y="285" text-anchor="middle" fill="#8892a6" font-size="12" font-family="sans-serif">
    数字未来
  </text>
</svg>
