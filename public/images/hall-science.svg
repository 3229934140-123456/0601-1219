<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d2847;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#061224;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="planet1" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#5dade2;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#1a5276;stop-opacity:0.3" />
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg3)"/>
  <!-- 星空 -->
  <circle cx="50" cy="40" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="120" cy="70" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="200" cy="30" r="2" fill="#ffffff" opacity="0.9"/>
  <circle cx="300" cy="60" r="1.5" fill="#ffffff" opacity="0.7"/>
  <circle cx="350" cy="100" r="1" fill="#ffffff" opacity="0.5"/>
  <circle cx="80" cy="150" r="1" fill="#ffffff" opacity="0.6"/>
  <circle cx="320" cy="180" r="1.5" fill="#ffffff" opacity="0.8"/>
  <circle cx="150" cy="200" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="280" cy="240" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="60" cy="260" r="1" fill="#ffffff" opacity="0.5"/>
  <!-- 星球 -->
  <circle cx="130" cy="120" r="40" fill="url(#planet1)"/>
  <ellipse cx="130" cy="120" rx="55" ry="15" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.6" transform="rotate(-20 130 120)"/>
  <!-- 恐龙骨架轮廓 -->
  <path d="M200 230 Q220 180 250 200 Q280 220 300 190 L310 200 Q290 230 260 220 Q230 210 210 240 Z" 
        fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.7"/>
  <circle cx="305" cy="185" r="8" fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.7"/>
  <!-- DNA 螺旋简化 -->
  <path d="M340 140 Q330 160 340 180 Q350 200 340 220 Q330 240 340 260" 
        fill="none" stroke="#00d4aa" stroke-width="2" opacity="0.6"/>
  <path d="M360 140 Q370 160 360 180 Q350 200 360 220 Q370 240 360 260" 
        fill="none" stroke="#d4af37" stroke-width="2" opacity="0.6"/>
  <line x1="335" y1="170" x2="365" y2="170" stroke="#8892a6" stroke-width="1" opacity="0.4"/>
  <line x1="335" y1="210" x2="365" y2="210" stroke="#8892a6" stroke-width="1" opacity="0.4"/>
  <line x1="335" y1="250" x2="365" y2="250" stroke="#8892a6" stroke-width="1" opacity="0.4"/>
  <text x="200" y="285" text-anchor="middle" fill="#8892a6" font-size="12" font-family="serif">
    自然科学
  </text>
