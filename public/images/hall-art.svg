<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1b4e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1033;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a1f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brush1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c85a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg2)"/>
  <!-- 画框 -->
  <rect x="100" y="50" width="200" height="180" fill="url(#brush1)" opacity="0.3"/>
  <rect x="110" y="60" width="180" height="160" fill="#1a1033"/>
  <!-- 抽象山水画 -->
  <path d="M120 180 Q150 120 180 160 Q210 100 240 150 Q270 130 280 170 L280 200 L120 200 Z" 
        fill="#d4af37" opacity="0.3"/>
  <path d="M130 190 Q160 150 190 170 Q220 140 250 170 Q260 160 270 180 L270 200 L130 200 Z" 
        fill="#d4af37" opacity="0.5"/>
  <!-- 太阳 -->
  <circle cx="240" cy="100" r="20" fill="#d4af37" opacity="0.8"/>
  <!-- 画框装饰 -->
  <rect x="95" y="45" width="210" height="10" fill="#d4af37" opacity="0.6"/>
  <rect x="95" y="230" width="210" height="10" fill="#d4af37" opacity="0.6"/>
  <rect x="95" y="45" width="10" height="195" fill="#d4af37" opacity="0.6"/>
  <rect x="295" y="45" width="10" height="195" fill="#d4af37" opacity="0.6"/>
  <text x="200" y="275" text-anchor="middle" fill="#8892a6" font-size="12" font-family="serif">
    艺术珍品
  </text>
  <!-- 粒子效果 -->
  <circle cx="60" cy="80" r="2" fill="#d4af37" opacity="0.5"/>
  <circle cx="340" cy="60" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="350" cy="200" r="2" fill="#d4af37" opacity="0.3"/>
  <circle cx="50" cy="250" r="1.5" fill="#ffffff" opacity="0.3"/>
</svg>
