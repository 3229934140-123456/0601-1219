<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="exbg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2d4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cd7f32;stop-opacity:1" />
      <stop offset="30%" style="stop-color:#b87333;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#8b6914;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6b5310;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glowEx1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#d4af37;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#d4af37;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="300" height="300" fill="url(#exbg1)"/>
  <circle cx="150" cy="130" r="80" fill="url(#glowEx1)"/>
  <!-- 青铜鼎 -->
  <!-- 鼎身 -->
  <path d="M80 140 L80 200 Q80 230 110 230 L190 230 Q220 230 220 200 L220 140 L200 140 L200 110 L100 110 L100 140 Z" 
        fill="url(#bronze)"/>
  <!-- 鼎耳 -->
  <path d="M110 110 L110 85 Q110 70 150 70 Q190 70 190 85 L190 110" 
        fill="none" stroke="url(#bronze)" stroke-width="15"/>
  <!-- 鼎足 -->
  <rect x="95" y="230" width="20" height="40" fill="url(#bronze)"/>
  <rect x="185" y="230" width="20" height="40" fill="url(#bronze)"/>
  <!-- 装饰纹样 -->
  <path d="M100 160 Q150 150 200 160" fill="none" stroke="#8b6914" stroke-width="2" opacity="0.8"/>
  <path d="M100 180 Q150 170 200 180" fill="none" stroke="#8b6914" stroke-width="2" opacity="0.6"/>
  <circle cx="120" cy="190" r="8" fill="none" stroke="#6b5310" stroke-width="1.5" opacity="0.7"/>
  <circle cx="180" cy="190" r="8" fill="none" stroke="#6b5310" stroke-width="1.5" opacity="0.7"/>
  <!-- 高光 -->
  <path d="M90 145 L90 200 Q90 205 95 205" fill="none" stroke="#daa520" stroke-width="3" opacity="0.5"/>
  <!-- 粒子 -->
  <circle cx="50" cy="50" r="2" fill="#d4af37" opacity="0.5"/>
  <circle cx="250" cy="80" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="260" cy="220" r="2" fill="#d4af37" opacity="0.3"/>
  <circle cx="40" cy="250" r="1.5" fill="#ffffff" opacity="0.3"/>
</svg>
