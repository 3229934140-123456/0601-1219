<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d1f14;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a120a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a05;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="silk1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8c85a;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#d4af37;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8941f;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg5)"/>
  <!-- 传统服饰轮廓 -->
  <path d="M160 80 L150 100 L140 120 L145 200 Q160 220 200 220 Q240 220 255 200 L260 120 L250 100 L240 80 Z" 
        fill="url(#silk1)" opacity="0.4"/>
  <!-- 领口 -->
  <path d="M180 80 Q200 100 220 80 L210 95 Q200 105 190 95 Z" 
        fill="#d4af37" opacity="0.6"/>
  <!-- 腰带 -->
  <rect x="150" y="160" width="100" height="8" fill="#8b4513" opacity="0.8"/>
  <!-- 玉佩 -->
  <circle cx="200" cy="172" r="6" fill="#90ee90" opacity="0.7"/>
  <!-- 头饰 -->
  <ellipse cx="200" cy="65" rx="30" ry="10" fill="#d4af37" opacity="0.5"/>
  <circle cx="180" cy="60" r="4" fill="#d4af37" opacity="0.8"/>
  <circle cx="200" cy="55" r="5" fill="#d4af37" opacity="0.9"/>
  <circle cx="220" cy="60" r="4" fill="#d4af37" opacity="0.8"/>
  <!-- 装饰花纹 -->
  <path d="M160 130 Q200 145 240 130" fill="none" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <path d="M155 150 Q200 160 245 150" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.5"/>
  <!-- 灯笼 -->
  <ellipse cx="80" cy="100" rx="15" ry="20" fill="#dc143c" opacity="0.7"/>
  <rect x="75" y="75" width="10" height="5" fill="#d4af37" opacity="0.8"/>
  <rect x="77" y="120" width="6" height="10" fill="#d4af37" opacity="0.6"/>
  <ellipse cx="320" cy="150" rx="12" ry="16" fill="#dc143c" opacity="0.6"/>
  <rect x="316" y="130" width="8" height="4" fill="#d4af37" opacity="0.7"/>
  <text x="200" y="280" text-anchor="middle" fill="#8892a6" font-size="12" font-family="serif">
    民俗文化
  </text>
  <!-- 粒子 -->
  <circle cx="50" cy="200" r="2" fill="#d4af37" opacity="0.4"/>
  <circle cx="350" cy="250" r="1.5" fill="#d4af37" opacity="0.3"/>
  <circle cx="100" cy="250" r="1" fill="#ffffff" opacity="0.3"/>
</svg>
