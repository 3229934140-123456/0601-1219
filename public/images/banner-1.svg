<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bannerBg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a2c0a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2d1b0a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0f05;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#daa520;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8860b;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bannerBg1)"/>
  <!-- 沙漠沙丘 -->
  <path d="M0 200 Q200 180 400 190 Q600 200 800 180 L800 300 L0 300 Z" 
        fill="#8b4513" opacity="0.6"/>
  <path d="M0 230 Q150 215 300 225 Q450 235 600 220 Q700 215 800 230 L800 300 L0 300 Z" 
        fill="#a0522d" opacity="0.5"/>
  <!-- 骆驼商队剪影 -->
  <g fill="#2d1b0a" opacity="0.8">
    <path d="M550 210 L555 190 L565 185 L575 190 L580 210 Z"/>
    <path d="M555 185 L558 175 L565 175 L568 185"/>
    <circle cx="562" cy="170" r="6"/>
    <path d="M580 210 L585 190 L595 185 L605 190 L610 210 Z"/>
    <path d="M585 185 L588 175 L595 175 L598 185"/>
    <circle cx="592" cy="170" r="5"/>
    <!-- 人物 -->
    <circle cx="630" cy="185" r="8"/>
    <path d="M625 195 L622 220 L630 220 L632 200 L634 220 L638 220 L635 195 Z"/>
  </g>
  <!-- 远处建筑 -->
  <path d="M150 170 L155 150 L160 170 L165 145 L170 170 L175 155 L180 170 Z" 
        fill="#d4af37" opacity="0.4"/>
  <rect x="155" y="170" width="25" height="40" fill="#d4af37" opacity="0.3"/>
  <!-- 太阳 -->
  <circle cx="680" cy="80" r="35" fill="#ff6b35" opacity="0.9"/>
  <circle cx="680" cy="80" r="50" fill="#ff6b35" opacity="0.3"/>
  <!-- 丝绸飘带 -->
  <path d="M50 80 Q100 60 150 80 Q200 100 250 80 Q300 60 350 80" 
        fill="none" stroke="#d4af37" stroke-width="4" opacity="0.7"/>
  <path d="M60 100 Q110 85 160 100 Q210 115 260 100 Q310 85 360 100" 
        fill="none" stroke="#e8c85a" stroke-width="3" opacity="0.6"/>
  <!-- 文字 -->
  <text x="60" y="150" fill="url(#goldText)" font-size="42" font-weight="bold" font-family="serif">
    丝路遗珍特展
  </text>
  <text x="60" y="185" fill="#e8c85a" font-size="18" font-family="serif">
    限时开放中 · 66件珍贵文物
  </text>
  <!-- 粒子/光点 -->
  <circle cx="100" cy="50" r="2" fill="#ffd700" opacity="0.6"/>
  <circle cx="700" cy="150" r="1.5" fill="#ffffff" opacity="0.4"/>
  <circle cx="200" cy="250" r="1" fill="#d4af37" opacity="0.5"/>
  <circle cx="500" cy="60" r="1.5" fill="#ffd700" opacity="0.5"/>
</svg>
