<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300">
  <defs>
    <linearGradient id="bannerBg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1a2a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0d2840;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1628;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glowCenter" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4aa;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#00d4aa;stop-opacity:0" />
    </linearGradient>
  </defs>
  <rect width="800" height="300" fill="url(#bannerBg2)"/>
  <!-- 网格线 -->
  <g stroke="#00d4aa" stroke-width="0.5" opacity="0.15">
    <line x1="0" y1="100" x2="800" y2="100"/>
    <line x1="0" y1="150" x2="800" y2="150"/>
    <line x1="0" y1="200" x2="800" y2="200"/>
    <line x1="0" y1="250" x2="800" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
    <line x1="400" y1="0" x2="400" y2="300"/>
    <line x1="500" y1="0" x2="500" y2="300"/>
    <line x1="600" y1="0" x2="600" y2="300"/>
    <line x1="700" y1="0" x2="700" y2="300"/>
  </g>
  <!-- 全息投影人像 -->
  <ellipse cx="600" cy="150" rx="80" ry="120" fill="url(#glowCenter)"/>
  <ellipse cx="600" cy="100" rx="30" ry="35" fill="#00d4aa" opacity="0.3"/>
  <path d="M570 130 L570 220 Q580 235 600 235 Q620 235 630 220 L630 130" 
        fill="none" stroke="#00d4aa" stroke-width="3" opacity="0.5"/>
  <!-- 扫描线 -->
  <rect x="520" y="120" width="160" height="3" fill="#00d4aa" opacity="0.8">
    <animate attributeName="y" values="80;220;80" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- 数据点 -->
  <circle cx="100" cy="120" r="5" fill="#00d4aa" opacity="0.8"/>
  <circle cx="150" cy="200" r="4" fill="#d4af37" opacity="0.8"/>
  <circle cx="250" cy="80" r="3" fill="#00d4aa" opacity="0.6"/>
  <circle cx="350" cy="220" r="5" fill="#d4af37" opacity="0.7"/>
  <circle cx="450" cy="100" r="4" fill="#00d4aa" opacity="0.7"/>
  <circle cx="700" cy="200" r="3" fill="#d4af37" opacity="0.6"/>
  <!-- VR 眼镜 -->
  <rect x="180" y="130" width="80" height="35" rx="6" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.7"/>
  <rect x="185" y="135" width="25" height="25" rx="3" fill="#d4af37" opacity="0.3"/>
  <rect x="230" y="135" width="25" height="25" rx="3" fill="#d4af37" opacity="0.3"/>
  <line x1="215" y1="140" x2="215" y2="155" stroke="#d4af37" stroke-width="1.5" opacity="0.6"/>
  <!-- 文字 -->
  <text x="60" y="120" fill="#00d4aa" font-size="38" font-weight="bold" font-family="sans-serif">
    数字未来厅
  </text>
  <text x="60" y="155" fill="#8892a6" font-size="16" font-family="sans-serif">
    全新升级上线 · VR沉浸式体验
  </text>
  <text x="60" y="185" fill="#d4af37" font-size="14" font-family="sans-serif">
    18件数字展品 · 元宇宙概念
  </text>
</svg>
